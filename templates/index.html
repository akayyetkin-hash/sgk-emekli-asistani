<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGK Emekli Asistanı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col justify-between">

    <header class="bg-blue-700 text-white shadow-md">
        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <i class="fa-solid me-2 fa-calculator text-2xl text-blue-200"></i>
                <h1 class="text-xl font-bold tracking-wide">SGK Emekli Asistanı</h1>
            </div>
            <span class="bg-blue-800 text-blue-100 text-xs px-3 py-1 rounded-full font-medium">v1.0.0</span>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 py-8 flex-grow w-full">
        
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 mb-8">
            <h2 class="text-2xl font-bold text-slate-800 mb-2">Hoş Geldiniz! 👋</h2>
            <p class="text-slate-600 leading-relaxed">
                Bu platform, SGK hizmet dökümlerinizi ve çalışma bilgilerinizi analiz ederek kök aylığınızı, 
                emekli maaşınızı ve olası hesaplama hatalarını tespit etmenize yardımcı olur.
            </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="md:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                <h3 class="text-lg font-semibold text-slate-800 mb-4 flex items-center">
                    <i class="fa-solid fa-user-gear text-blue-600 mr-2"></i> Sigortalı ve Hizmet Bilgileri
                </h3>
                
                <form id="calcForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Sigorta Kolu / Statü</label>
                        <select class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                            <option value="4a">4/A (SSK)</option>
                            <option value="4b">4/B (Bağ-Kur)</option>
                            <option value="4c">4/C (Emekli Sandığı)</option>
                        </select>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">İlk İşe Giriş Tarihi</label>
                            <input type="date" class="w-full border border-slate-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 focus:outline-none
